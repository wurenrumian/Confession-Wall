<body>

        <nav class="nav-links">
          <a href="index.html" class="nav-item" id="navHome">

          <a href="explore.html" class="nav-item" id="navExplore">

          <a href="messages.html" class="nav-item" id="navMessages">

            <span>私信</span>

          <a href="profile.html" class="nav-item" id="navProfile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>我的发布</span>
          </a>
          <a href="settings.html" class="nav-item" id="navSettings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>设置</span>
          </a>
        </nav>
        <div class="sidebar-bottom">
          <div class="user-menu" id="userMenu">
            <div class="avatar" id="userAvatar">?</div>
            <div class="user-info">
              <div class="user-name" id="userName">匿名用户</div>
              <div class="user-handle" id="userHandle">@anonymous</div>
            </div>
            <svg class="more-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
          </div>
        </div>
      </aside>

      <main class="feed-main">
        <header class="feed-header">
          <h1>通知</h1>
          <button class="btn btn-secondary" id="clearAll" style="padding: 6px 16px; font-size: 13px;">清空全部</button>
        </header>

        <div id="notificationList">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>

        <div class="load-more" id="loadMoreArea" style="display:none">
          <button id="loadMoreBtn">加载更多</button>
        </div>
      </main>

      <aside class="sidebar-right">
        <div class="widget">
          <div class="widget-header">通知说明</div>
          <div class="widget-content">
            <div class="rules-item">
              <div class="rule-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </div>
              <div class="rule-text">
                <div class="rule-title">点赞通知</div>
                <div class="rule-desc">有人赞了你的消息</div>
              </div>
            </div>
            <div class="rules-item">
              <div class="rule-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
              </div>
              <div class="rule-text">
                <div class="rule-title">评论通知</div>
                <div class="rule-desc">有人评论了你的消息</div>
              </div>
            </div>
            <div class="rules-item">
              <div class="rule-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </div>
              <div class="rule-text">
                <div class="rule-title">系统通知</div>
                <div class="rule-desc">重要消息和审核通知</div>
              </div>
            </div>
          </div>
        </div>

        <div class="footer-links">
          <a href="#">使用条款</a>
          <a href="#">隐私政策</a>
          <a href="#">联系我们</a>
          <a href="#">帮助中心</a>
          <span>© 2024 RUC Confession Wall</span>
        </div>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="userMenuModal">
    <div class="modal" style="max-width:300px;padding:8px">
      <div class="modal-header" style="padding:8px 12px">
        <h2 style="font-size:15px">账号</h2>
        <button class="modal-close" id="closeUserMenuModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" style="padding:8px">
        <button class="btn btn-secondary" id="logoutBtn" style="width:100%;text-align:left;padding:12px 16px;border-radius:8px">
          退出登录
        </button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <button class="scroll-to-top" id="scrollToTop">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
  </button>

  <script type="module">
    import apiClient from './js/api/client.js';

    let currentPage = 1;
    let isLoading = false;

    const notificationList = document.getElementById('notificationList');
    const loadMoreArea = document.getElementById('loadMoreArea');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const clearAllBtn = document.getElementById('clearAll');
    const userMenuModal = document.getElementById('userMenuModal');
    const userMenu = document.getElementById('userMenu');
    const toastContainer = document.getElementById('toastContainer');
    const scrollToTop = document.getElementById('scrollToTop');

    if (!apiClient.isLoggedIn()) {
      window.location.href = 'login.html';
    }

    if (apiClient.getUser()) {
      const user = apiClient.getUser();
      document.getElementById('userName').textContent = user.username || '匿名用户';
      document.getElementById('userHandle').textContent = '@' + (user.username || 'anonymous');
      document.getElementById('userAvatar').textContent = (user.username || 'A')[0].toUpperCase();
    }

    function showToast(message, type = 'default') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function formatTime(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diff = (now - date) / 1000;
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
      if (diff < 604800) return Math.floor(diff / 86400) + '天前';
      return date.toLocaleDateString('zh-CN');
    }

    function getNotificationIcon(type) {
      const icons = {
        like: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
        comment: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>',
        reply: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>',
        system: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'
      };
      return icons[type] || icons.system;
    }

    function getNotificationColor(type) {
      const colors = {
        like: 'var(--red)',
        comment: 'var(--blue)',
        reply: 'var(--blue)',
        system: 'var(--ruc-red)'
      };
      return colors[type] || 'var(--gray-500)';
    }

    function renderNotification(notif) {
      const icon = getNotificationIcon(notif.type);
      const color = getNotificationColor(notif.type);

      return `
        <div class="notification-item ${notif.is_read ? '' : 'unread'}" data-id="${notif.id}">
          <div class="notification-icon" style="color: ${color}">${icon}</div>
          <div class="notification-content">
            <div class="notification-title">${escapeHtml(notif.title)}</div>
            <div class="notification-text">${escapeHtml(notif.content)}</div>
            <div class="notification-time">${formatTime(notif.created_at)}</div>
          </div>
        </div>
      `;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadNotifications(page = 1, append = false) {
      if (isLoading) return;
      isLoading = true;

      if (!append) {
        notificationList.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
      }

      try {
        const result = await apiClient.getNotifications({ page, limit: 20 });

        if (result.code === 200 && result.data) {
          const { notifications } = result.data;

          if (!append) {
            notificationList.innerHTML = '';
          }

          if (notifications && notifications.length > 0) {
            notificationList.innerHTML += notifications.map(renderNotification).join('');
            loadMoreArea.style.display = notifications.length === 20 ? 'block' : 'none';
            attachNotificationListeners();
          } else if (!append) {
            notificationList.innerHTML = `
              <div class="empty-state">
                <div class="empty-icon">🔔</div>
                <h3>暂无通知</h3>
                <p>还没有收到任何通知</p>
              </div>
            `;
            loadMoreArea.style.display = 'none';
          }
        }
      } catch (error) {
        showToast('网络错误，请稍后重试', 'error');
      } finally {
        isLoading = false;
      }
    }

    function attachNotificationListeners() {
      document.querySelectorAll('.notification-item').forEach(item => {
        item.addEventListener('click', async () => {
          const id = item.dataset.id;
          if (item.classList.contains('unread')) {
            try {
              await apiClient.markNotificationRead(id);
              item.classList.remove('unread');
            } catch (e) {
              // ignore
            }
          }
        });
      });
    }

    loadMoreBtn.addEventListener('click', () => {
      currentPage++;
      loadNotifications(currentPage, true);
    });

    clearAllBtn.addEventListener('click', async () => {
      if (!confirm('确定要清空所有通知吗？')) return;
      try {
        await apiClient.clearNotifications();
        showToast('通知已清空', 'success');
        notificationList.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔔</div>
            <h3>暂无通知</h3>
            <p>还没有收到任何通知</p>
          </div>
        `;
        loadMoreArea.style.display = 'none';
      } catch {
        showToast('清空失败，请稍后重试', 'error');
      }
    });

    userMenu.addEventListener('click', () => {
      userMenuModal.classList.add('active');
    });

    document.getElementById('closeUserMenuModal').addEventListener('click', () => {
      userMenuModal.classList.remove('active');
    });

    userMenuModal.addEventListener('click', (e) => {
      if (e.target === userMenuModal) userMenuModal.classList.remove('active');
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await apiClient.logout();
      showToast('已退出登录', 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 800);
    });

    window.addEventListener('scroll', () => {
      scrollToTop.classList.toggle('visible', window.scrollY > 300);
    });

    scrollToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    loadNotifications(1, false);
  </script>

  <style>
    .notification-item {
      display: flex;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--transition);
    }

    .notification-item:hover {
      background: var(--gray-50);
    }

    .notification-item.unread {
      background: rgba(158, 27, 50, 0.03);
    }

    .notification-item.unread::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--ruc-red);
    }

    .notification-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .notification-content {
      flex: 1;
      min-width: 0;
    }

    .notification-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .notification-text {
      font-size: 14px;
      color: var(--gray-600);
      margin-bottom: 4px;
    }

    .notification-time {
      font-size: 12px;
      color: var(--gray-400);
    }

    .notification-item {
      position: relative;
    }
  </style>
</body>
</html>
