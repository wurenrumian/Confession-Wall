<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知 - 人大匿名墙</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="main-layout">
      <aside class="sidebar-left">
        <div class="logo-area">
          <span class="logo-text">人大匿名墙</span>
        </div>
        <nav class="nav-links">
          <a href="index.html" class="nav-item"><span>首页</span></a>
          <a href="explore.html" class="nav-item"><span>发现</span></a>
          <a href="notifications.html" class="nav-item active"><span>通知</span></a>
          <a href="messages.html" class="nav-item"><span>私信</span></a>
          <a href="profile.html" class="nav-item"><span>我的发布</span></a>
          <a href="settings.html" class="nav-item"><span>设置</span></a>
          <a href="admin.html" class="nav-item" id="navAdmin" style="display:none"><span>管理后台</span></a>
        </nav>
        <div class="sidebar-bottom">
          <div class="user-menu" id="userMenu">
            <div class="avatar" id="userAvatar">?</div>
            <div class="user-info">
              <div class="user-name" id="userName">匿名用户</div>
              <div class="user-handle" id="userHandle">@anonymous</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="feed-main">
        <header class="feed-header">
          <h1>通知</h1>
          <button class="btn btn-secondary" id="clearAllBtn">清空全部</button>
        </header>
        <div id="notificationList"></div>
      </main>

      <aside class="sidebar-right">
        <div class="widget">
          <div class="widget-header">说明</div>
          <div class="widget-content">
            <p>这里会显示点赞、评论、回复和私信提醒。</p>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="userMenuModal">
    <div class="modal" style="max-width:300px;padding:8px">
      <div class="modal-header" style="padding:8px 12px">
        <h2 style="font-size:15px">账号</h2>
        <button class="modal-close" id="closeUserMenuModal">×</button>
      </div>
      <div class="modal-body" style="padding:8px">
        <button class="btn btn-secondary" id="logoutBtn" style="width:100%">退出登录</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import apiClient from './js/api/client.js'

    const notificationList = document.getElementById('notificationList')
    const clearAllBtn = document.getElementById('clearAllBtn')
    const toastContainer = document.getElementById('toastContainer')
    const userMenu = document.getElementById('userMenu')
    const userMenuModal = document.getElementById('userMenuModal')

    if (!apiClient.isLoggedIn()) {
      window.location.href = 'login.html'
    }

    const currentUser = apiClient.getUser()
    if (currentUser) {
      document.getElementById('userName').textContent = currentUser.username || '匿名用户'
      document.getElementById('userHandle').textContent = `@${currentUser.username || 'anonymous'}`
      document.getElementById('userAvatar').textContent = (currentUser.username || 'A')[0].toUpperCase()

      if (currentUser.role === 'admin') {
        document.getElementById('navAdmin').style.display = ''
      }
    }

    function showToast(message, type = 'default') {
      const toast = document.createElement('div')
      toast.className = `toast ${type}`
      toast.textContent = message
      toastContainer.appendChild(toast)
      setTimeout(() => toast.remove(), 3000)
    }

    function escapeHtml(text = '') {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    function formatTime(dateStr) {
      const date = new Date(dateStr.replace(' ', 'T'))
      const diffSeconds = Math.floor((Date.now() - date.getTime()) / 1000)

      if (diffSeconds < 60) return '刚刚'
      if (diffSeconds < 3600) return `${Math.floor(diffSeconds / 60)} 分钟前`
      if (diffSeconds < 86400) return `${Math.floor(diffSeconds / 3600)} 小时前`
      if (diffSeconds < 604800) return `${Math.floor(diffSeconds / 86400)} 天前`
      return date.toLocaleDateString('zh-CN')
    }

    function renderNotifications(notifications) {
      if (!notifications.length) {
        notificationList.innerHTML = `
          <div class="empty-state">
            <h3>暂无通知</h3>
            <p>有人点赞、评论或发私信时会显示在这里。</p>
          </div>
        `
        return
      }

      notificationList.innerHTML = notifications.map((item) => `
        <article class="notification-item ${item.is_read ? '' : 'unread'}" data-id="${item.id}">
          <div class="notification-row">
            <strong>${escapeHtml(item.title)}</strong>
            <span class="notification-time">${formatTime(item.created_at)}</span>
          </div>
          <p class="notification-text">${escapeHtml(item.content || '')}</p>
        </article>
      `).join('')

      document.querySelectorAll('.notification-item.unread').forEach((item) => {
        item.addEventListener('click', async () => {
          const result = await apiClient.markNotificationRead(item.dataset.id)
          if (result.code === 200) {
            item.classList.remove('unread')
          }
        })
      })
    }

    async function loadNotifications() {
      notificationList.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>'

      try {
        const result = await apiClient.getNotifications({ page: 1, limit: 50 })
        if (result.code === 200 && result.data) {
          renderNotifications(result.data.notifications || [])
        } else {
          showToast(result.message || '加载通知失败', 'error')
        }
      } catch (error) {
        showToast('网络错误，请稍后重试', 'error')
      }
    }

    clearAllBtn.addEventListener('click', async () => {
      if (!confirm('确定要清空所有通知吗？')) {
        return
      }

      try {
        const result = await apiClient.clearNotifications()
        if (result.code === 200) {
          renderNotifications([])
          showToast('通知已清空', 'success')
        } else {
          showToast(result.message || '清空失败', 'error')
        }
      } catch (error) {
        showToast('网络错误，请稍后重试', 'error')
      }
    })

    userMenu.addEventListener('click', () => {
      userMenuModal.classList.add('active')
    })

    document.getElementById('closeUserMenuModal').addEventListener('click', () => {
      userMenuModal.classList.remove('active')
    })

    userMenuModal.addEventListener('click', (event) => {
      if (event.target === userMenuModal) {
        userMenuModal.classList.remove('active')
      }
    })

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await apiClient.logout()
      window.location.href = 'login.html'
    })

    loadNotifications()
  </script>

  <style>
    .notification-item {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--transition);
    }

    .notification-item:hover {
      background: var(--gray-50);
    }

    .notification-item.unread {
      background: rgba(158, 27, 50, 0.04);
      border-left: 3px solid var(--ruc-red);
    }

    .notification-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .notification-text {
      margin: 0;
      color: var(--gray-600);
      line-height: 1.5;
    }

    .notification-time {
      color: var(--gray-400);
      font-size: 12px;
      white-space: nowrap;
    }
  </style>
</body>
</html>
