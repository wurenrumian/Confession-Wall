<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 人大匿名墙</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">
</head>
<body>
  <div class="container">
    <div class="main-layout">
      <aside class="sidebar-left">
        <div class="logo-area">
          <svg width="50" height="50" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="25" cy="25" r="24" stroke="#9E1B32" stroke-width="2" fill="none"/>
            <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="#9E1B32" font-size="14" font-weight="900" font-family="Arial, sans-serif">RUC</text>
          </svg>
          <span class="logo-text">人大匿名墙</span>
        </div>
        <nav class="nav-links">
          <a href="index.html" class="nav-item" id="navHome">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>首页</span>
          </a>
          <a href="explore.html" class="nav-item" id="navExplore">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>发现</span>
          </a>
          <a href="notifications.html" class="nav-item" id="navNotifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span>通知</span>
            <span class="notification-badge" id="notifBadge" style="display:none">0</span>
          </a>
          <a href="messages.html" class="nav-item" id="navMessages">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <span>私信</span>
          </a>
          <a href="profile.html" class="nav-item" id="navProfile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>我的发布</span>
          </a>
          <a href="settings.html" class="nav-item active" id="navSettings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>设置</span>
          </a>
        </nav>
        <div class="sidebar-bottom">
          <div class="user-menu" id="userMenu">
            <div class="avatar" id="userAvatar">?</div>
            <div class="user-info">
              <div class="user-name" id="userName">匿名用户</div>
              <div class="user-handle" id="userHandle">@anonymous</div>
            </div>
            <svg class="more-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
          </div>
        </div>
      </aside>

      <main class="feed-main">
        <header class="feed-header">
          <h1>设置</h1>
        </header>

        <div class="settings-container">
          <section class="settings-section">
            <h2 class="settings-title">通知设置</h2>
            <div class="settings-list">
              <div class="settings-item">
                <div class="settings-item-info">
                  <div class="settings-item-title">启用通知</div>
                  <div class="settings-item-desc">接收点赞、评论等通知</div>
                </div>
                <label class="toggle">
                  <input type="checkbox" id="notificationsEnabled" checked>
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="settings-item">
                <div class="settings-item-info">
                  <div class="settings-item-title">邮件通知</div>
                  <div class="settings-item-desc">接收重要通知的邮件提醒</div>
                </div>
                <label class="toggle">
                  <input type="checkbox" id="emailNotifications">
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
          </section>

          <section class="settings-section">
            <h2 class="settings-title">隐私设置</h2>
            <div class="settings-list">
              <div class="settings-item">
                <div class="settings-item-info">
                  <div class="settings-item-title">个人资料可见</div>
                  <div class="settings-item-desc">允许其他人查看你的发布</div>
                </div>
                <label class="toggle">
                  <input type="checkbox" id="profileVisible" checked>
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
          </section>

          <section class="settings-section">
            <h2 class="settings-title">账号安全</h2>
            <div class="settings-list">
              <div class="settings-item clickable" id="changePasswordBtn">
                <div class="settings-item-info">
                  <div class="settings-item-title">修改密码</div>
                  <div class="settings-item-desc">更新你的账号密码</div>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;color:var(--gray-400)"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <div class="settings-item clickable" id="forgotPasswordBtn">
                <div class="settings-item-info">
                  <div class="settings-item-title">忘记密码</div>
                  <div class="settings-item-desc">通过邮箱重置密码</div>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;color:var(--gray-400)"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </div>
          </section>

          <section class="settings-section">
            <h2 class="settings-title">关于</h2>
            <div class="settings-list">
              <div class="settings-item">
                <div class="settings-item-info">
                  <div class="settings-item-title">版本信息</div>
                  <div class="settings-item-desc">v1.0.0</div>
                </div>
              </div>
              <div class="settings-item clickable" id="termsBtn">
                <div class="settings-item-info">
                  <div class="settings-item-title">使用条款</div>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;color:var(--gray-400)"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <div class="settings-item clickable" id="privacyBtn">
                <div class="settings-item-info">
                  <div class="settings-item-title">隐私政策</div>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;color:var(--gray-400)"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </div>
          </section>

          <div class="settings-danger">
            <button class="btn btn-danger" id="logoutBtn">退出登录</button>
          </div>
        </div>
      </main>

      <aside class="sidebar-right">
        <div class="widget">
          <div class="widget-header">帮助</div>
          <div class="widget-content">
            <div class="rules-item">
              <div class="rule-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              </div>
              <div class="rule-text">
                <div class="rule-title">遇到问题？</div>
                <div class="rule-desc">联系管理员获取帮助</div>
              </div>
            </div>
          </div>
        </div>

        <div class="footer-links">
          <a href="#">使用条款</a>
          <a href="#">隐私政策</a>
          <a href="#">联系我们</a>
          <a href="#">帮助中心</a>
          <span>© 2024 RUC Confession Wall</span>
        </div>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="passwordModal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h2>修改密码</h2>
        <button class="modal-close" id="closePasswordModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="currentPassword">当前密码</label>
          <input type="password" id="currentPassword" class="form-input" placeholder="请输入当前密码">
        </div>
        <div class="form-group">
          <label class="form-label" for="newPassword">新密码</label>
          <input type="password" id="newPassword" class="form-input" placeholder="请输入新密码（6-64位）">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmNewPassword">确认新密码</label>
          <input type="password" id="confirmNewPassword" class="form-input" placeholder="请再次输入新密码">
        </div>
        <button class="btn btn-primary" id="savePasswordBtn" style="width:100%;margin-top:8px">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="forgotPasswordModal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <h2>重置密码</h2>
        <button class="modal-close" id="closeForgotModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom:16px;color:var(--gray-600)">输入你的注册邮箱，我们会发送密码重置链接。</p>
        <div class="form-group">
          <label class="form-label" for="resetEmail">邮箱地址</label>
          <input type="email" id="resetEmail" class="form-input" placeholder="请输入邮箱地址">
        </div>
        <button class="btn btn-primary" id="sendResetBtn" style="width:100%;margin-top:8px">发送重置链接</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="userMenuModal">
    <div class="modal" style="max-width:300px;padding:8px">
      <div class="modal-header" style="padding:8px 12px">
        <h2 style="font-size:15px">账号</h2>
        <button class="modal-close" id="closeUserMenuModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" style="padding:8px">
        <button class="btn btn-secondary" id="logoutBtnSidebar" style="width:100%;text-align:left;padding:12px 16px;border-radius:8px">
          退出登录
        </button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <button class="scroll-to-top" id="scrollToTop">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
  </button>

  <script type="module">
    import apiClient from './js/api/client.js';

    const notificationsEnabled = document.getElementById('notificationsEnabled');
    const emailNotifications = document.getElementById('emailNotifications');
    const profileVisible = document.getElementById('profileVisible');
    const passwordModal = document.getElementById('passwordModal');
    const forgotPasswordModal = document.getElementById('forgotPasswordModal');
    const userMenuModal = document.getElementById('userMenuModal');
    const userMenu = document.getElementById('userMenu');
    const toastContainer = document.getElementById('toastContainer');
    const scrollToTop = document.getElementById('scrollToTop');

    if (!apiClient.isLoggedIn()) {
      window.location.href = 'login.html';
    }

    if (apiClient.getUser()) {
      const user = apiClient.getUser();
      document.getElementById('userName').textContent = user.username || '匿名用户';
      document.getElementById('userHandle').textContent = '@' + (user.username || 'anonymous');
      document.getElementById('userAvatar').textContent = (user.username || 'A')[0].toUpperCase();
    }

    function showToast(message, type = 'default') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    async function loadSettings() {
      try {
        const result = await apiClient.getSettings();
        if (result.code === 200 && result.data) {
          notificationsEnabled.checked = result.data.notifications_enabled !== false;
          emailNotifications.checked = result.data.email_notifications === true;
          profileVisible.checked = result.data.profile_visible !== false;
        }
      } catch (e) {
        // ignore
      }
    }

    async function saveSettings() {
      try {
        const result = await apiClient.updateSettings({
          notifications_enabled: notificationsEnabled.checked,
          email_notifications: emailNotifications.checked,
          profile_visible: profileVisible.checked
        });
        if (result.code === 200) {
          showToast('设置已保存', 'success');
        } else {
          showToast(result.message || '保存失败', 'error');
        }
      } catch {
        showToast('网络错误，请稍后重试', 'error');
      }
    }

    notificationsEnabled.addEventListener('change', saveSettings);
    emailNotifications.addEventListener('change', saveSettings);
    profileVisible.addEventListener('change', saveSettings);

    document.getElementById('changePasswordBtn').addEventListener('click', () => {
      passwordModal.classList.add('active');
    });

    document.getElementById('closePasswordModal').addEventListener('click', () => {
      passwordModal.classList.remove('active');
    });

    passwordModal.addEventListener('click', (e) => {
      if (e.target === passwordModal) passwordModal.classList.remove('active');
    });

    document.getElementById('savePasswordBtn').addEventListener('click', () => {
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmNewPassword = document.getElementById('confirmNewPassword').value;

      if (!currentPassword) {
        showToast('请输入当前密码', 'warning');
        return;
      }
      if (!newPassword || newPassword.length < 6) {
        showToast('新密码长度需为6-64位', 'warning');
        return;
      }
      if (newPassword !== confirmNewPassword) {
        showToast('两次输入的密码不一致', 'warning');
        return;
      }

      showToast('修改密码功能开发中', 'warning');
      passwordModal.classList.remove('active');
    });

    document.getElementById('forgotPasswordBtn').addEventListener('click', () => {
      forgotPasswordModal.classList.add('active');
    });

    document.getElementById('closeForgotModal').addEventListener('click', () => {
      forgotPasswordModal.classList.remove('active');
    });

    forgotPasswordModal.addEventListener('click', (e) => {
      if (e.target === forgotPasswordModal) forgotPasswordModal.classList.remove('active');
    });

    document.getElementById('sendResetBtn').addEventListener('click', async () => {
      const email = document.getElementById('resetEmail').value.trim();
      if (!email) {
        showToast('请输入邮箱地址', 'warning');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showToast('请输入有效的邮箱地址', 'warning');
        return;
      }

      showToast('密码重置功能开发中', 'warning');
      forgotPasswordModal.classList.remove('active');
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await apiClient.logout();
      showToast('已退出登录', 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 800);
    });

    userMenu.addEventListener('click', () => {
      userMenuModal.classList.add('active');
    });

    document.getElementById('closeUserMenuModal').addEventListener('click', () => {
      userMenuModal.classList.remove('active');
    });

    userMenuModal.addEventListener('click', (e) => {
      if (e.target === userMenuModal) userMenuModal.classList.remove('active');
    });

    document.getElementById('logoutBtnSidebar').addEventListener('click', async () => {
      await apiClient.logout();
      showToast('已退出登录', 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 800);
    });

    window.addEventListener('scroll', () => {
      scrollToTop.classList.toggle('visible', window.scrollY > 300);
    });

    scrollToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    loadSettings();
  </script>

  <style>
    .settings-container {
      padding: 16px;
    }

    .settings-section {
      margin-bottom: 24px;
    }

    .settings-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--gray-700);
    }

    .settings-list {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .settings-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--gray-100);
    }

    .settings-item:last-child {
      border-bottom: none;
    }

    .settings-item.clickable {
      cursor: pointer;
      transition: background var(--transition);
    }

    .settings-item.clickable:hover {
      background: var(--gray-50);
    }

    .settings-item-info {
      flex: 1;
    }

    .settings-item-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .settings-item-desc {
      font-size: 13px;
      color: var(--gray-500);
    }

    .toggle {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--gray-300);
      transition: 0.3s;
      border-radius: 26px;
    }

    .toggle-slider::before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    .toggle input:checked + .toggle-slider {
      background-color: var(--ruc-red);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(22px);
    }

    .settings-danger {
      padding: 24px 0;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--gray-700);
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-size: 15px;
      transition: all var(--transition);
    }

    .form-input:focus {
      border-color: var(--ruc-red);
      box-shadow: 0 0 0 3px rgba(158, 27, 50, 0.1);
    }
  </style>
</body>
</html>
