<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine On

    RewriteCond %{REQUEST_URI} ^/api
    RewriteRule ^/api(.*)$ /var/www/html/backend/index.php [QSA,L]
</VirtualHost>
