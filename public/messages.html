<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>私信 - 人大匿名墙</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="main-layout">
      <aside class="sidebar-left">
        <div class="logo-area">
          <span class="logo-text">人大匿名墙</span>
        </div>
        <nav class="nav-links">
          <a href="index.html" class="nav-item"><span>首页</span></a>
          <a href="explore.html" class="nav-item"><span>发现</span></a>
          <a href="notifications.html" class="nav-item"><span>通知</span></a>
          <a href="messages.html" class="nav-item active"><span>私信</span></a>
          <a href="profile.html" class="nav-item"><span>我的发布</span></a>
          <a href="settings.html" class="nav-item"><span>设置</span></a>
          <a href="admin.html" class="nav-item" id="navAdmin" style="display:none"><span>管理后台</span></a>
        </nav>
        <div class="sidebar-bottom">
          <div class="user-menu" id="userMenu">
            <div class="avatar" id="userAvatar">?</div>
            <div class="user-info">
              <div class="user-name" id="userName">匿名用户</div>
              <div class="user-handle" id="userHandle">@anonymous</div>
            </div>
          </div>
        </div>
      </aside>

      <main class="feed-main">
        <header class="feed-header">
          <h1>私信</h1>
        </header>

        <section class="compose-card">
          <h2>发起对话</h2>
          <div class="compose-grid">
            <input id="receiverSearch" type="text" placeholder="输入用户名搜索" autocomplete="off">
            <textarea id="firstMessage" placeholder="输入消息内容" maxlength="500"></textarea>
            <button class="btn btn-primary" id="startConversationBtn">发送私信</button>
          </div>
          <div id="userSuggestions" class="user-suggestions"></div>
        </section>

        <section id="conversationList"></section>
      </main>

      <aside class="sidebar-right">
        <div class="widget">
          <div class="widget-header">说明</div>
          <div class="widget-content">
            <p>输入用户名即可发起一段最简单的私信对话。</p>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="chatModal">
    <div class="modal chat-modal">
      <div class="modal-header">
        <h2 id="chatTitle">聊天</h2>
        <button class="modal-close" id="closeChatModal">×</button>
      </div>
      <div class="modal-body chat-body" id="chatMessages"></div>
      <div class="chat-compose">
        <textarea id="messageInput" placeholder="输入消息内容" maxlength="500"></textarea>
        <button class="btn btn-primary" id="sendMessageBtn">发送</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="userMenuModal">
    <div class="modal" style="max-width:300px;padding:8px">
      <div class="modal-header" style="padding:8px 12px">
        <h2 style="font-size:15px">账号</h2>
        <button class="modal-close" id="closeUserMenuModal">×</button>
      </div>
      <div class="modal-body" style="padding:8px">
        <button class="btn btn-secondary" id="logoutBtn" style="width:100%">退出登录</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import apiClient from './js/api/client.js'

    const conversationList = document.getElementById('conversationList')
    const receiverSearch = document.getElementById('receiverSearch')
    const userSuggestions = document.getElementById('userSuggestions')
    const firstMessage = document.getElementById('firstMessage')
    const startConversationBtn = document.getElementById('startConversationBtn')
    const chatModal = document.getElementById('chatModal')
    const chatTitle = document.getElementById('chatTitle')
    const chatMessages = document.getElementById('chatMessages')
    const messageInput = document.getElementById('messageInput')
    const sendMessageBtn = document.getElementById('sendMessageBtn')
    const toastContainer = document.getElementById('toastContainer')
    const userMenu = document.getElementById('userMenu')
    const userMenuModal = document.getElementById('userMenuModal')

    let selectedUser = null
    let currentChatUser = null

    if (!apiClient.isLoggedIn()) {
      window.location.href = 'login.html'
    }

    const currentUser = apiClient.getUser()
    if (currentUser) {
      document.getElementById('userName').textContent = currentUser.username || '匿名用户'
      document.getElementById('userHandle').textContent = `@${currentUser.username || 'anonymous'}`
      document.getElementById('userAvatar').textContent = (currentUser.username || 'A')[0].toUpperCase()

      if (currentUser.role === 'admin') {
        document.getElementById('navAdmin').style.display = ''
      }
    }

    function showToast(message, type = 'default') {
      const toast = document.createElement('div')
      toast.className = `toast ${type}`
      toast.textContent = message
      toastContainer.appendChild(toast)
      setTimeout(() => toast.remove(), 3000)
    }

    function escapeHtml(text = '') {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    function formatTime(dateStr) {
      const date = new Date(dateStr.replace(' ', 'T'))
      const diffSeconds = Math.floor((Date.now() - date.getTime()) / 1000)

      if (diffSeconds < 60) return '刚刚'
      if (diffSeconds < 3600) return `${Math.floor(diffSeconds / 60)} 分钟前`
      if (diffSeconds < 86400) return `${Math.floor(diffSeconds / 3600)} 小时前`
      if (diffSeconds < 604800) return `${Math.floor(diffSeconds / 86400)} 天前`
      return date.toLocaleDateString('zh-CN')
    }

    function renderConversationList(conversations) {
      if (!conversations.length) {
        conversationList.innerHTML = `
          <div class="empty-state">
            <h3>暂无私信</h3>
            <p>上方输入用户名和内容后，就能直接发起对话。</p>
          </div>
        `
        return
      }

      conversationList.innerHTML = conversations.map((item) => `
        <article class="conversation-item" data-user-id="${item.user.id}" data-username="${escapeHtml(item.user.username)}">
          <div class="conversation-avatar">${escapeHtml((item.user.username || '?')[0].toUpperCase())}</div>
          <div class="conversation-main">
            <div class="conversation-row">
              <strong>${escapeHtml(item.user.username)}</strong>
              <span class="conversation-time">${formatTime(item.last_message_time)}</span>
            </div>
            <p class="conversation-preview">${escapeHtml(item.last_message || '')}</p>
          </div>
          ${item.unread_count > 0 ? `<span class="conversation-badge">${item.unread_count}</span>` : ''}
        </article>
      `).join('')

      document.querySelectorAll('.conversation-item').forEach((item) => {
        item.addEventListener('click', () => {
          openChat({
            id: Number(item.dataset.userId),
            username: item.dataset.username
          })
        })
      })
    }

    function renderSuggestions(users) {
      if (!users.length) {
        userSuggestions.innerHTML = ''
        return
      }

      userSuggestions.innerHTML = users.map((user) => `
        <button type="button" class="suggestion-item" data-id="${user.id}" data-username="${escapeHtml(user.username)}">
          ${escapeHtml(user.username)}
        </button>
      `).join('')

      document.querySelectorAll('.suggestion-item').forEach((item) => {
        item.addEventListener('click', () => {
          selectedUser = {
            id: Number(item.dataset.id),
            username: item.dataset.username
          }
          receiverSearch.value = selectedUser.username
          userSuggestions.innerHTML = ''
        })
      })
    }

    async function loadConversations() {
      conversationList.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>'

      try {
        const result = await apiClient.getConversations({ page: 1, limit: 50 })
        if (result.code === 200 && result.data) {
          renderConversationList(result.data.conversations || [])
        } else {
          showToast(result.message || '加载私信失败', 'error')
        }
      } catch (error) {
        showToast('网络错误，请稍后重试', 'error')
      }
    }

    async function openChat(user) {
      currentChatUser = user
      chatTitle.textContent = user.username
      chatMessages.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>'
      chatModal.classList.add('active')

      try {
        const result = await apiClient.getConversation(user.id, { page: 1, limit: 50 })
        if (result.code === 200 && result.data) {
          const messages = result.data.messages || []
          if (!messages.length) {
            chatMessages.innerHTML = '<div class="empty-chat">还没有聊天记录，发第一条消息吧。</div>'
            return
          }

          chatMessages.innerHTML = messages.map((message) => {
            const isSelf = Number(message.sender_id) === Number(currentUser.id)
            return `
              <div class="chat-message ${isSelf ? 'sent' : 'received'}">
                <div class="chat-bubble">${escapeHtml(message.content)}</div>
                <div class="chat-time">${formatTime(message.created_at)}</div>
              </div>
            `
          }).join('')
          chatMessages.scrollTop = chatMessages.scrollHeight
        } else {
          chatMessages.innerHTML = '<div class="empty-chat">加载失败，请稍后重试。</div>'
        }
      } catch (error) {
        chatMessages.innerHTML = '<div class="empty-chat">加载失败，请稍后重试。</div>'
      }
    }

    async function doSendMessage(userId, content, shouldResetModalInput = true) {
      const result = await apiClient.sendMessage(userId, content)
      if (result.code !== 201) {
        throw new Error(result.message || '发送失败')
      }

      if (shouldResetModalInput) {
        messageInput.value = ''
      }

      await loadConversations()

      if (currentChatUser && Number(currentChatUser.id) === Number(userId)) {
        await openChat(currentChatUser)
      }
    }

    receiverSearch.addEventListener('input', async () => {
      const keyword = receiverSearch.value.trim()
      selectedUser = selectedUser && selectedUser.username === keyword ? selectedUser : null

      if (keyword.length < 2) {
        userSuggestions.innerHTML = ''
        return
      }

      try {
        const result = await apiClient.searchUsers(keyword)
        if (result.code === 200 && result.data) {
          renderSuggestions(result.data.users || [])
        }
      } catch (error) {
        userSuggestions.innerHTML = ''
      }
    })

    startConversationBtn.addEventListener('click', async () => {
      const content = firstMessage.value.trim()

      if (!selectedUser) {
        showToast('请先从搜索结果里选择一个用户名', 'warning')
        return
      }

      if (!content) {
        showToast('请输入消息内容', 'warning')
        return
      }

      startConversationBtn.disabled = true
      try {
        await doSendMessage(selectedUser.id, content, false)
        firstMessage.value = ''
        showToast('私信已发送', 'success')
      } catch (error) {
        showToast(error.message, 'error')
      } finally {
        startConversationBtn.disabled = false
      }
    })

    sendMessageBtn.addEventListener('click', async () => {
      const content = messageInput.value.trim()
      if (!currentChatUser) {
        return
      }

      if (!content) {
        showToast('请输入消息内容', 'warning')
        return
      }

      sendMessageBtn.disabled = true
      try {
        await doSendMessage(currentChatUser.id, content)
      } catch (error) {
        showToast(error.message, 'error')
      } finally {
        sendMessageBtn.disabled = false
      }
    })

    document.getElementById('closeChatModal').addEventListener('click', () => {
      chatModal.classList.remove('active')
    })

    chatModal.addEventListener('click', (event) => {
      if (event.target === chatModal) {
        chatModal.classList.remove('active')
      }
    })

    userMenu.addEventListener('click', () => {
      userMenuModal.classList.add('active')
    })

    document.getElementById('closeUserMenuModal').addEventListener('click', () => {
      userMenuModal.classList.remove('active')
    })

    userMenuModal.addEventListener('click', (event) => {
      if (event.target === userMenuModal) {
        userMenuModal.classList.remove('active')
      }
    })

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await apiClient.logout()
      window.location.href = 'login.html'
    })

    loadConversations()
  </script>

  <style>
    .compose-card {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .compose-card h2 {
      margin-bottom: 12px;
      font-size: 18px;
    }

    .compose-grid {
      display: grid;
      gap: 10px;
    }

    .compose-grid input,
    .compose-grid textarea,
    .chat-compose textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      font-size: 14px;
      resize: vertical;
    }

    .compose-grid textarea,
    .chat-compose textarea {
      min-height: 88px;
    }

    .user-suggestions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .suggestion-item {
      border: 1px solid var(--gray-200);
      background: var(--white);
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .conversation-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .conversation-item:hover {
      background: var(--gray-50);
    }

    .conversation-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--ruc-red);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }

    .conversation-main {
      flex: 1;
      min-width: 0;
    }

    .conversation-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .conversation-preview {
      margin: 0;
      color: var(--gray-600);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-time {
      color: var(--gray-400);
      font-size: 12px;
      white-space: nowrap;
    }

    .conversation-badge {
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border-radius: 999px;
      background: var(--ruc-red);
      color: var(--white);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-modal {
      max-width: 560px;
      height: 72vh;
      display: flex;
      flex-direction: column;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
    }

    .chat-compose {
      border-top: 1px solid var(--border);
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .chat-message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }

    .chat-message.sent {
      align-self: flex-end;
      align-items: flex-end;
    }

    .chat-message.received {
      align-self: flex-start;
      align-items: flex-start;
    }

    .chat-bubble {
      border-radius: 14px;
      padding: 10px 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .chat-message.sent .chat-bubble {
      background: var(--ruc-red);
      color: var(--white);
    }

    .chat-message.received .chat-bubble {
      background: var(--gray-100);
      color: var(--black);
    }

    .chat-time,
    .empty-chat {
      color: var(--gray-400);
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</body>
</html>
