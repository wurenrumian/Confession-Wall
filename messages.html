<body>

        </div>
        <nav class="nav-links">
          <a href="index.html" class="nav-item" id="navHome">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>首页</span>
          </a>
          <a href="explore.html" class="nav-item" id="navExplore">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>发现</span>

          <a href="notifications.html" class="nav-item" id="navNotifications">

            <span>通知</span>
            <span class="notification-badge" id="notifBadge" style="display:none">0</span>
          </a>
          <a href="messages.html" class="nav-item active" id="navMessages">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <span>私信</span>
          </a>
          <a href="profile.html" class="nav-item" id="navProfile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>我的发布</span>
          </a>
          <a href="settings.html" class="nav-item" id="navSettings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>设置</span>
          </a>
        </nav>
        <div class="sidebar-bottom">
          <div class="user-menu" id="userMenu">
            <div class="avatar" id="userAvatar">?</div>
            <div class="user-info">
              <div class="user-name" id="userName">匿名用户</div>
              <div class="user-handle" id="userHandle">@anonymous</div>
            </div>
            <svg class="more-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
          </div>
        </div>
      </aside>

      <main class="feed-main">
        <header class="feed-header">
          <h1>私信</h1>
        </header>

        <div id="conversationList">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>

        <div class="load-more" id="loadMoreArea" style="display:none">
          <button id="loadMoreBtn">加载更多</button>
        </div>
      </main>

      <aside class="sidebar-right">
        <div class="widget">
          <div class="widget-header">私信说明</div>
          <div class="widget-content">
            <div class="rules-item">
              <div class="rule-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </div>
              <div class="rule-text">
                <div class="rule-title">隐私保护</div>
                <div class="rule-desc">私信内容仅双方可见</div>
              </div>
            </div>
            <div class="rules-item">
              <div class="rule-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <div class="rule-text">
                <div class="rule-title">文明交流</div>
                <div class="rule-desc">请友善沟通，文明用语</div>
              </div>
            </div>
          </div>
        </div>

        <div class="footer-links">
          <a href="#">使用条款</a>
          <a href="#">隐私政策</a>
          <a href="#">联系我们</a>
          <a href="#">帮助中心</a>
          <span>© 2024 RUC Confession Wall</span>
        </div>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="chatModal">
    <div class="modal" style="max-width:500px;height:70vh;display:flex;flex-direction:column">
      <div class="modal-header">
        <h2 id="chatTitle">聊天</h2>
        <button class="modal-close" id="closeChatModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="chatMessages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px">
      </div>
      <div class="comment-compose" style="border-top:1px solid var(--border);padding:12px 16px">
        <textarea id="messageInput" placeholder="输入消息..." maxlength="500" style="width:100%;border:1px solid var(--gray-200);border-radius:8px;padding:10px 14px;resize:none;min-height:60px;font-size:14px"></textarea>
        <button class="btn btn-primary" id="sendMessage" style="margin-top:8px;width:100%">发送</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="userMenuModal">
    <div class="modal" style="max-width:300px;padding:8px">
      <div class="modal-header" style="padding:8px 12px">
        <h2 style="font-size:15px">账号</h2>
        <button class="modal-close" id="closeUserMenuModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" style="padding:8px">
        <button class="btn btn-secondary" id="logoutBtn" style="width:100%;text-align:left;padding:12px 16px;border-radius:8px">
          退出登录
        </button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <button class="scroll-to-top" id="scrollToTop">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
  </button>

  <script type="module">
    import apiClient from './js/api/client.js';

    let currentPage = 1;
    let isLoading = false;
    let currentChatUserId = null;
    let currentChatUserName = null;

    const conversationList = document.getElementById('conversationList');
    const loadMoreArea = document.getElementById('loadMoreArea');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const chatModal = document.getElementById('chatModal');
    const chatMessages = document.getElementById('chatMessages');
    const chatTitle = document.getElementById('chatTitle');
    const messageInput = document.getElementById('messageInput');
    const sendMessageBtn = document.getElementById('sendMessage');
    const userMenuModal = document.getElementById('userMenuModal');
    const userMenu = document.getElementById('userMenu');
    const toastContainer = document.getElementById('toastContainer');
    const scrollToTop = document.getElementById('scrollToTop');

    if (!apiClient.isLoggedIn()) {
      window.location.href = 'login.html';
    }

    const currentUser = apiClient.getUser();

    if (currentUser) {
      document.getElementById('userName').textContent = currentUser.username || '匿名用户';
      document.getElementById('userHandle').textContent = '@' + (currentUser.username || 'anonymous');
      document.getElementById('userAvatar').textContent = (currentUser.username || 'A')[0].toUpperCase();
    }

    function showToast(message, type = 'default') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function formatTime(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diff = (now - date) / 1000;
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
      if (diff < 604800) return Math.floor(diff / 86400) + '天前';
      return date.toLocaleDateString('zh-CN');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderConversation(conv) {
      const avatar = conv.user.username ? conv.user.username[0].toUpperCase() : '?';
      return `
        <div class="conversation-item" data-user-id="${conv.user.id}" data-username="${escapeHtml(conv.user.username)}">
          <div class="conversation-avatar">${avatar}</div>
          <div class="conversation-content">
            <div class="conversation-header">
              <span class="conversation-name">${escapeHtml(conv.user.username)}</span>
              <span class="conversation-time">${formatTime(conv.last_message_time)}</span>
            </div>
            <div class="conversation-preview">${escapeHtml(conv.last_message)}</div>
          </div>
          ${conv.unread_count > 0 ? `<span class="notification-badge">${conv.unread_count}</span>` : ''}
        </div>
      `;
    }

    async function loadConversations(page = 1, append = false) {
      if (isLoading) return;
      isLoading = true;

      if (!append) {
        conversationList.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
      }

      try {
        const result = await apiClient.getConversations({ page, limit: 20 });

        if (result.code === 200 && result.data) {
          const { conversations } = result.data;

          if (!append) {
            conversationList.innerHTML = '';
          }

          if (conversations && conversations.length > 0) {
            conversationList.innerHTML += conversations.map(renderConversation).join('');
            loadMoreArea.style.display = conversations.length === 20 ? 'block' : 'none';
            attachConversationListeners();
          } else if (!append) {
            conversationList.innerHTML = `
              <div class="empty-state">
                <div class="empty-icon">💬</div>
                <h3>暂无私信</h3>
                <p>还没有任何私信对话</p>
              </div>
            `;
            loadMoreArea.style.display = 'none';
          }
        }
      } catch (error) {
        showToast('网络错误，请稍后重试', 'error');
      } finally {
        isLoading = false;
      }
    }

    async function loadChatMessages(userId, username) {
      chatTitle.textContent = username;
      chatMessages.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
      chatModal.classList.add('active');

      try {
        const result = await apiClient.getConversation(userId, { limit: 50 });

        if (result.code === 200 && result.data) {
          const { messages, user } = result.data;

          if (messages && messages.length > 0) {
            chatMessages.innerHTML = messages.map(msg => {
              const isMe = msg.sender_id === currentUser.id;
              return `
                <div class="chat-message ${isMe ? 'sent' : 'received'}">
                  <div class="chat-bubble">${escapeHtml(msg.content)}</div>
                  <div class="chat-time">${formatTime(msg.created_at)}</div>
                </div>
              `;
            }).join('');
            chatMessages.scrollTop = chatMessages.scrollHeight;
          } else {
            chatMessages.innerHTML = '<div style="text-align:center;color:var(--gray-400);padding:40px">暂无消息，开始对话吧</div>';
          }
        }
      } catch (error) {
        chatMessages.innerHTML = '<div style="text-align:center;color:var(--red);padding:40px">加载失败</div>';
      }
    }

    function attachConversationListeners() {
      document.querySelectorAll('.conversation-item').forEach(item => {
        item.addEventListener('click', () => {
          const userId = item.dataset.userId;
          const username = item.dataset.username;
          currentChatUserId = userId;
          currentChatUserName = username;
          loadChatMessages(userId, username);
        });
      });
    }

    loadMoreBtn.addEventListener('click', () => {
      currentPage++;
      loadConversations(currentPage, true);
    });

    document.getElementById('closeChatModal').addEventListener('click', () => {
      chatModal.classList.remove('active');
      currentChatUserId = null;
    });

    chatModal.addEventListener('click', (e) => {
      if (e.target === chatModal) chatModal.classList.remove('active');
    });

    sendMessageBtn.addEventListener('click', async () => {
      const content = messageInput.value.trim();
      if (!content) {
        showToast('请输入消息', 'warning');
        return;
      }
      if (!currentChatUserId) return;

      sendMessageBtn.disabled = true;

      try {
        const result = await apiClient.sendMessage(currentChatUserId, content);
        if (result.code === 201) {
          messageInput.value = '';
          const isMe = true;
          const newMsg = document.createElement('div');
          newMsg.className = 'chat-message sent';
          newMsg.innerHTML = `
            <div class="chat-bubble">${escapeHtml(content)}</div>
            <div class="chat-time">刚刚</div>
          `;
          const emptyMsg = chatMessages.querySelector('div[style*="暂无消息"]');
          if (emptyMsg) emptyMsg.remove();
          chatMessages.appendChild(newMsg);
          chatMessages.scrollTop = chatMessages.scrollHeight;
        } else {
          showToast(result.message || '发送失败', 'error');
        }
      } catch {
        showToast('网络错误，请稍后重试', 'error');
      } finally {
        sendMessageBtn.disabled = false;
      }
    });

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessageBtn.click();
      }
    });

    userMenu.addEventListener('click', () => {
      userMenuModal.classList.add('active');
    });

    document.getElementById('closeUserMenuModal').addEventListener('click', () => {
      userMenuModal.classList.remove('active');
    });

    userMenuModal.addEventListener('click', (e) => {
      if (e.target === userMenuModal) userMenuModal.classList.remove('active');
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await apiClient.logout();
      showToast('已退出登录', 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 800);
    });

    window.addEventListener('scroll', () => {
      scrollToTop.classList.toggle('visible', window.scrollY > 300);
    });

    scrollToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    loadConversations(1, false);
  </script>

  <style>
    .conversation-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--transition);
    }

    .conversation-item:hover {
      background: var(--gray-50);
    }

    .conversation-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--ruc-red);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }

    .conversation-content {
      flex: 1;
      min-width: 0;
    }

    .conversation-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .conversation-name {
      font-weight: 700;
      font-size: 15px;
    }

    .conversation-time {
      font-size: 12px;
      color: var(--gray-400);
    }

    .conversation-preview {
      font-size: 14px;
      color: var(--gray-500);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-message {
      display: flex;
      flex-direction: column;
      max-width: 70%;
    }

    .chat-message.sent {
      align-self: flex-end;
      align-items: flex-end;
    }

    .chat-message.received {
      align-self: flex-start;
      align-items: flex-start;
    }

    .chat-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    .chat-message.sent .chat-bubble {
      background: var(--ruc-red);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }

    .chat-message.received .chat-bubble {
      background: var(--gray-100);
      color: var(--black);
      border-bottom-left-radius: 4px;
    }

    .chat-time {
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 4px;
    }
  </style>
</body>
</html>
