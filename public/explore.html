</head>
<body>
  <div class="container">
    <div class="main-layout">
      <aside class="sidebar-left">
        <div class="logo-area">
          <svg width="50" height="50" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">

            <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="#9E1B32" font-size="14" font-weight="900" font-family="Arial, sans-serif">RUC</text>
          </svg>
          <span class="logo-text">人大匿名墙</span>
        </div>
        <nav class="nav-links">
          <a href="index.html" class="nav-item" id="navHome">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>首页</span>
          </a>
          <a href="explore.html" class="nav-item active" id="navExplore">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>发现</span>
          </a>
          <a href="notifications.html" class="nav-item" id="navNotifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span>通知</span>
            <span class="notification-badge" id="notifBadge" style="display:none">0</span>
          </a>
          <a href="messages.html" class="nav-item" id="navMessages">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <span>私信</span>
          </a>
          <a href="profile.html" class="nav-item" id="navProfile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>我的发布</span>
          </a>
          <a href="settings.html" class="nav-item" id="navSettings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>设置</span>
          </a>
          <a href="admin.html" class="nav-item" id="navAdmin" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>管理后台</span>
          </a>
        </nav>
        <div class="sidebar-bottom">
          <div class="user-menu" id="userMenu">
            <div class="avatar" id="userAvatar">?</div>
            <div class="user-info">
              <div class="user-name" id="userName">匿名用户</div>
              <div class="user-handle" id="userHandle">@anonymous</div>
            </div>
            <svg class="more-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
          </div>
        </div>
      </aside>

      <main class="feed-main">
        <header class="feed-header">
          <h1>发现</h1>
        </header>

        <div class="feed-compose" style="padding: 16px;">
          <div class="search-box" style="position: relative; margin: 0;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: var(--gray-500);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="搜索匿名墙内容..." style="width: 100%; padding: 14px 16px 14px 48px; border: 1px solid var(--border); border-radius: 30px; background: var(--gray-100); font-size: 16px;">
          </div>
        </div>

        <div class="feed-divider"></div>

        <div id="searchResults">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">🔍</div>
            <h3>搜索内容</h3>
            <p>输入关键词搜索表白、秘密或提问</p>
          </div>
        </div>

        <div class="load-more" id="loadMoreArea" style="display:none">
          <button id="loadMoreBtn">加载更多</button>
        </div>
      </main>

      <aside class="sidebar-right">
        <div class="widget">
          <div class="widget-header">热门话题</div>
          <div class="widget-content">
            <div class="trending-item" data-tag="期末复习">
              <div class="trend-category">今日热议</div>
              <div class="trend-topic">#期末复习#</div>
              <div class="trend-count">328 条内容</div>
            </div>
            <div class="trending-item" data-tag="图书馆搭子">
              <div class="trend-category">校园生活</div>
              <div class="trend-topic">#图书馆搭子#</div>
              <div class="trend-count">156 条内容</div>
            </div>
            <div class="trending-item" data-tag="暗恋心事">
              <div class="trend-category">情感树洞</div>
              <div class="trend-topic">#暗恋心事#</div>
              <div class="trend-count">89 条内容</div>
            </div>
          </div>
        </div>

        <div class="footer-links">
          <a href="#">使用条款</a>
          <a href="#">隐私政策</a>
          <a href="#">联系我们</a>
          <a href="#">帮助中心</a>
          <span>© 2024 RUC Confession Wall</span>
        </div>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="commentModal">
    <div class="modal comment-modal">
      <div class="modal-header">
        <h2>评论</h2>
        <button class="modal-close" id="closeCommentModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="commentMessagePreview"></div>
        <div class="comment-list" id="commentList"></div>
      </div>
      <div class="comment-compose">
        <textarea id="commentInput" placeholder="写下你的评论..." maxlength="200"></textarea>
        <button class="btn btn-primary" id="submitComment">发送</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="userMenuModal">
    <div class="modal" style="max-width:300px;padding:8px">
      <div class="modal-header" style="padding:8px 12px">
        <h2 style="font-size:15px">账号</h2>
        <button class="modal-close" id="closeUserMenuModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" style="padding:8px">
        <button class="btn btn-secondary" id="logoutBtn" style="width:100%;text-align:left;padding:12px 16px;border-radius:8px">
          退出登录
        </button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <button class="scroll-to-top" id="scrollToTop">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
  </button>

  <script type="module">
    import apiClient from './js/api/client.js';

    let currentPage = 1;
    let currentQuery = '';
    let isLoading = false;

    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const emptyState = document.getElementById('emptyState');
    const loadMoreArea = document.getElementById('loadMoreArea');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const commentModal = document.getElementById('commentModal');
    const commentList = document.getElementById('commentList');
    const commentInput = document.getElementById('commentInput');
    const submitComment = document.getElementById('submitComment');
    const commentMessagePreview = document.getElementById('commentMessagePreview');
    const userMenuModal = document.getElementById('userMenuModal');
    const userMenu = document.getElementById('userMenu');
    const toastContainer = document.getElementById('toastContainer');
    const scrollToTop = document.getElementById('scrollToTop');

    if (!apiClient.isLoggedIn()) {
      window.location.href = 'login.html';
    }

    if (apiClient.getUser()) {
      const user = apiClient.getUser();
      document.getElementById('userName').textContent = user.username || '匿名用户';
      document.getElementById('userHandle').textContent = '@' + (user.username || 'anonymous');
      document.getElementById('userAvatar').textContent = (user.username || 'A')[0].toUpperCase();
      if (user && user.role === 'admin') {
        const adminNav = document.getElementById('navAdmin');
        if (adminNav) adminNav.style.display = '';
      }
    }
    }
    }

    function showToast(message, type = 'default') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function getTypeIcon(type) {
      const icons = {
        confession: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
        secret: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
        question: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
      };
      return icons[type] || icons.confession;
    }

    function getTypeName(type) {
      const names = { confession: '表白', secret: '秘密', question: '提问' };
      return names[type] || '表白';
    }

    function formatTime(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diff = (now - date) / 1000;
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
      if (diff < 604800) return Math.floor(diff / 86400) + '天前';
      return date.toLocaleDateString('zh-CN');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderTweet(msg) {
      const typeLabel = getTypeName(msg.type);
      const typeIcon = getTypeIcon(msg.type);
      const avatarChar = msg.type === 'confession' ? '❤' : msg.type === 'secret' ? '👁' : '?';

      return `
        <article class="tweet" data-id="${msg.id}">
          <div class="tweet-main">
            <div class="tweet-avatar">${avatarChar}</div>
            <div class="tweet-content">
              <div class="tweet-header">
                <span class="tweet-author">匿名用户</span>
                <span class="tweet-time">${formatTime(msg.created_at)}</span>
                <span class="tweet-type-badge ${msg.type}">${typeIcon} ${typeLabel}</span>
              </div>
              <p class="tweet-text">${escapeHtml(msg.content)}</p>
              <div class="tweet-actions">
                <button class="tweet-action comment" data-action="comment" data-id="${msg.id}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                  <span>${msg.comment_count || 0}</span>
                </button>
                <button class="tweet-action like ${msg.is_liked ? 'liked' : ''}" data-action="like" data-id="${msg.id}">
                  <svg viewBox="0 0 24 24" fill="${msg.is_liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                  <span>${msg.like_count || 0}</span>
                </button>
                <button class="tweet-action share" data-action="share" data-id="${msg.id}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                  <span>分享</span>
                </button>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    async function search(query, page = 1, append = false) {
      if (isLoading) return;
      isLoading = true;

      if (!append) {
        searchResults.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
      }

      try {
        const result = await apiClient.searchMessages(query, { page, limit: 20 });

        if (result.code === 200 && result.data) {
          const { messages } = result.data;

          if (!append) {
            searchResults.innerHTML = '';
          }

          if (messages && messages.length > 0) {
            searchResults.innerHTML += messages.map(renderTweet).join('');
            loadMoreArea.style.display = messages.length === 20 ? 'block' : 'none';
            attachTweetListeners();
          } else if (!append) {
            searchResults.innerHTML = `
              <div class="empty-state">
                <div class="empty-icon">🔍</div>
                <h3>没有找到相关结果</h3>
                <p>换个关键词试试吧</p>
              </div>
            `;
            loadMoreArea.style.display = 'none';
          }
        }
      } catch (error) {
        showToast('网络错误，请稍后重试', 'error');
      } finally {
        isLoading = false;
      }
    }

    let searchTimeout;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      currentQuery = searchInput.value.trim();
      if (currentQuery.length < 2) {
        searchResults.innerHTML = `
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">🔍</div>
            <h3>搜索内容</h3>
            <p>输入关键词搜索表白、秘密或提问</p>
          </div>
        `;
        loadMoreArea.style.display = 'none';
        return;
      }
      searchTimeout = setTimeout(() => {
        currentPage = 1;
        search(currentQuery, 1, false);
      }, 300);
    });

    loadMoreBtn.addEventListener('click', () => {
      currentPage++;
      search(currentQuery, currentPage, true);
    });

    function attachTweetListeners() {
      document.querySelectorAll('.tweet').forEach(tweet => {
        const id = tweet.dataset.id;

        tweet.querySelector('[data-action="like"]').addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!apiClient.isLoggedIn()) {
            showToast('请先登录', 'warning');
            window.location.href = 'login.html';
            return;
          }
          const btn = tweet.querySelector('.like');
          const span = btn.querySelector('span');
          const svg = btn.querySelector('svg');
          const wasLiked = btn.classList.contains('liked');
          const oldCount = parseInt(span.textContent) || 0;

          btn.classList.toggle('liked');
          svg.setAttribute('fill', wasLiked ? 'none' : 'currentColor');
          span.textContent = wasLiked ? oldCount - 1 : oldCount + 1;

          try {
            const result = await apiClient.likeMessage(id);
            if (result.code !== 200) {
              btn.classList.toggle('liked');
              svg.setAttribute('fill', wasLiked ? 'currentColor' : 'none');
              span.textContent = oldCount;
            }
          } catch {
            btn.classList.toggle('liked');
            svg.setAttribute('fill', wasLiked ? 'currentColor' : 'none');
            span.textContent = oldCount;
          }
        });

        tweet.querySelector('[data-action="comment"]').addEventListener('click', async (e) => {
          e.stopPropagation();
          currentMessageId = id;
          const content = tweet.querySelector('.tweet-text').textContent;
          const type = tweet.querySelector('.tweet-type-badge').className.split(' ').find(c => ['confession', 'secret', 'question'].includes(c));
          commentMessagePreview.innerHTML = `
            <div style="padding:8px 0 16px;font-size:14px;color:var(--gray-500);border-bottom:1px solid var(--gray-200);margin-bottom:12px">
              <span class="tweet-type-badge ${type}">${getTypeIcon(type)} ${getTypeName(type)}</span>
              <span style="margin-left:8px">${escapeHtml(content.substring(0, 50))}${content.length > 50 ? '...' : ''}</span>
            </div>
          `;
          commentList.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
          commentModal.classList.add('active');

          try {
            const result = await apiClient.getComments(id);
            if (result.code === 200 && result.data && result.data.comments) {
              if (result.data.comments.length > 0) {
                commentList.innerHTML = result.data.comments.map(c => `
                  <div class="comment-item">
                    <div class="comment-author">热心同学</div>
                    <div class="comment-content">${escapeHtml(c.content)}</div>
                    <div class="comment-time">${formatTime(c.created_at)}</div>
                  </div>
                `).join('');
              } else {
                commentList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--gray-400)">暂无评论，快来抢沙发！</div>';
              }
            }
          } catch {
            commentList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--red)">加载评论失败</div>';
          }
        });

        tweet.querySelector('[data-action="share"]').addEventListener('click', (e) => {
          e.stopPropagation();
          if (navigator.share) {
            navigator.share({ title: '人大匿名墙', text: '来看看这个有趣的内容！' });
          } else {
            navigator.clipboard.writeText(window.location.origin + '?msg=' + id);
            showToast('链接已复制到剪贴板', 'success');
          }
        });
      });
    }

    let currentMessageId = null;

    document.getElementById('closeCommentModal').addEventListener('click', () => {
      commentModal.classList.remove('active');
      currentMessageId = null;
    });

    commentModal.addEventListener('click', (e) => {
      if (e.target === commentModal) commentModal.classList.remove('active');
    });

    submitComment.addEventListener('click', async () => {
      const content = commentInput.value.trim();
      if (!content) {
        showToast('请输入评论', 'warning');
        return;
      }
      if (!currentMessageId) return;

      submitComment.disabled = true;

      try {
        const result = await apiClient.createComment(currentMessageId, { content });
        if (result.code === 201) {
          commentInput.value = '';
          const newComment = document.createElement('div');
          newComment.className = 'comment-item';
          newComment.innerHTML = `
            <div class="comment-author">热心同学</div>
            <div class="comment-content">${escapeHtml(content)}</div>
            <div class="comment-time">刚刚</div>
          `;
          const emptyMsg = commentList.querySelector('div[style*="暂无评论"]');
          if (emptyMsg) emptyMsg.remove();
          commentList.appendChild(newComment);
          showToast('评论成功！', 'success');

          const tweet = document.querySelector(`.tweet[data-id="${currentMessageId}"]`);
          if (tweet) {
            const commentBtn = tweet.querySelector('.comment span');
            const count = parseInt(commentBtn.textContent) || 0;
            commentBtn.textContent = count + 1;
          }
        } else {
          showToast(result.message || '评论失败', 'error');
        }
      } catch {
        showToast('网络错误，请稍后重试', 'error');
      } finally {
        submitComment.disabled = false;
      }
    });

    userMenu.addEventListener('click', () => {
      userMenuModal.classList.add('active');
    });

    document.getElementById('closeUserMenuModal').addEventListener('click', () => {
      userMenuModal.classList.remove('active');
    });

    userMenuModal.addEventListener('click', (e) => {
      if (e.target === userMenuModal) userMenuModal.classList.remove('active');
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await apiClient.logout();
      showToast('已退出登录', 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 800);
    });

    document.querySelectorAll('.trending-item').forEach(item => {
      item.addEventListener('click', () => {
        const tag = item.dataset.tag;
        searchInput.value = tag;
        currentQuery = tag;
        currentPage = 1;
        search(tag, 1, false);
      });
    });

    window.addEventListener('scroll', () => {
      scrollToTop.classList.toggle('visible', window.scrollY > 300);
    });

    scrollToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
